  /* ═══════════════════════════════════════
     TERMINAL PAGE — standalone styles
  ═══════════════════════════════════════ */
  .term-section {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-top: 6rem;
    padding-bottom: 3rem;
  }
  .term-section .wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* header */
  .term-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .term-header .sec-n {
    font-family: 'Share Tech Mono', monospace;
    font-size: .75rem;
    color: var(--accent, #00ff88);
    letter-spacing: .12em;
    opacity: .5;
  }
  .term-header h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    color: var(--fg, #e8e8e8);
    letter-spacing: .06em;
    margin: 0;
  }
  .term-header .sec-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(0,255,136,.35) 0%, transparent 100%);
    min-width: 2rem;
  }
  .term-hint-strip {
    display: flex;
    gap: .5rem;
    align-items: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem;
    color: rgba(0,255,136,.5);
    letter-spacing: .08em;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .term-hint-strip span { opacity: .6; }
  .term-hint-strip .th-key {
    border: 1px solid rgba(0,255,136,.3);
    padding: .1rem .4rem;
    border-radius: 2px;
    color: var(--accent, #00ff88);
    opacity: 1;
  }

  /* ── The terminal window ── */
  .big-terminal {
    flex: 1;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(0,255,136,.22);
    border-radius: 6px;
    background: rgba(0,0,0,.72);
    backdrop-filter: blur(6px);
    min-height: 560px;
    max-height: 72vh;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,255,136,.06), inset 0 0 60px rgba(0,0,0,.4);
    transition: border-color .25s;
  }
  .big-terminal:focus-within {
    border-color: rgba(0,255,136,.5);
    box-shadow: 0 0 40px rgba(0,255,136,.12);
  }

  /* titlebar */
  .bt-bar {
    display: flex;
    align-items: center;
    gap: .5rem;
    padding: .55rem 1rem;
    background: rgba(0,255,136,.04);
    border-bottom: 1px solid rgba(0,255,136,.12);
    flex-shrink: 0;
  }
  .bt-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .bt-dot--r { background: #ff5f57; }
  .bt-dot--y { background: #ffbd2e; }
  .bt-dot--g { background: #28c840; }
  .bt-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: .72rem;
    color: rgba(0,255,136,.6);
    letter-spacing: .1em;
    margin-left: .4rem;
  }
  .bt-badge {
    margin-left: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: .62rem;
    color: rgba(0,255,136,.35);
    letter-spacing: .08em;
  }

  /* body */
  .bt-body {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.2rem 1rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem;
    line-height: 1.7;
    color: var(--fg, #e8e8e8);
    scrollbar-width: thin;
    scrollbar-color: rgba(0,255,136,.2) transparent;
    cursor: text;
  }
  .bt-body::-webkit-scrollbar { width: 4px; }
  .bt-body::-webkit-scrollbar-thumb { background: rgba(0,255,136,.2); border-radius: 2px; }

  /* line types */
  .tl   { margin: 0; padding: 0; white-space: pre-wrap; word-break: break-all; }
  .tg   { height: .4rem; }

  .tp   { color: var(--accent, #00ff88); }           /* prompt $ */
  .tc   { color: #fff; }                              /* typed command */

  .to-cmd     { color: var(--accent, #00ff88); }     /* echoed command */
  .to-resp    { color: #c8d6e5; }                    /* normal output */
  .to-accent  { color: var(--accent, #00ff88); }     /* highlighted */
  .to-warn    { color: #ffbd2e; }                    /* warning / easter */
  .to-err     { color: #ff5f57; }                    /* error */
  .to-dim     { color: rgba(200,214,229,.4); }       /* dim */
  .to-cyan    { color: #00cfff; }
  .to-magenta { color: #d97bff; }
  .to-bold    { font-weight: 700; color: #fff; }

  /* input line */
  .bt-input-line {
    display: flex;
    align-items: center;
    gap: .5rem;
    padding: .1rem 0;
  }
  .bt-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem;
    color: #fff;
    caret-color: var(--accent, #00ff88);
  }
  .bt-cursor {
    color: var(--accent, #00ff88);
    animation: blink .9s step-end infinite;
    font-size: .85rem;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* quick-commands bar */
  .term-quickbar {
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
    margin-top: 1rem;
  }
  .tqb-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: .68rem;
    letter-spacing: .07em;
    padding: .3rem .8rem;
    border: 1px solid rgba(0,255,136,.2);
    background: transparent;
    color: rgba(0,255,136,.7);
    border-radius: 2px;
    cursor: pointer;
    transition: all .15s;
  }
  .tqb-btn:hover {
    border-color: var(--accent, #00ff88);
    color: var(--accent, #00ff88);
    background: rgba(0,255,136,.06);
  }

  /* neofetch layout */
  .nf-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0 1.5rem;
    margin: .2rem 0;
  }
  .nf-k { color: var(--accent, #00ff88); }
  .nf-v { color: #c8d6e5; }

  /* ── responsive ── */
  @media (max-width: 600px) {
    .bt-body { font-size: .72rem; padding: .8rem; }
    .big-terminal { max-height: 65vh; }
  }
  </style>
</head>

    /* all valid command keys for Tab autocomplete */
    const CMD_KEYS = Object.keys(CMDS);

    /* ═════════════════════════════════════
       RENDER HELPERS
    ═════════════════════════════════════ */
    function appendLine(cls, html) {
      const p = document.createElement('p');
      p.className = 'tl ' + cls;
      p.innerHTML = html;
      body.insertBefore(p, inputLine);
    }

    function appendSpacer() {
      const p = document.createElement('p');
      p.className = 'tg';
      body.insertBefore(p, inputLine);
    }

    function scrollBottom() {
      body.scrollTop = body.scrollHeight;
    }

    /* ═════════════════════════════════════
       BOOT SEQUENCE
    ═════════════════════════════════════ */
    const BOOT = [
      { cls:'to-dim',    html:'  EdwarOS 5.0 — Java-Powered Terminal' },
      { cls:'to-dim',    html:'  ───────────────────────────────────' },
      { cls:'to-resp',   html:'  Type <span class="to-accent">help</span> for available commands.' },
      { cls:'to-resp',   html:'  Or click a quick-command button below. ↓' },
    ];

    BOOT.forEach(({ cls, html }) => appendLine(cls, html));
    appendSpacer();
    scrollBottom();

    /* ═════════════════════════════════════
       COMMAND RUNNER
    ═════════════════════════════════════ */
    function runCmd(raw) {
      const trimmed = raw.trim();
      if (!trimmed) return;

      cmdHistory.unshift(trimmed);
      histIdx = -1;

      /* echo the typed command */
      const echo = document.createElement('p');
      echo.className = 'tl';
      echo.innerHTML = `<span class="tp">$&nbsp;</span><span class="to-cmd">${escHtml(trimmed)}</span>`;
      body.insertBefore(echo, inputLine);

      const key     = trimmed.toLowerCase();
      const handler = CMDS[key];

      if (key === 'clear') {
        /* remove everything except the inputLine */
        [...body.children].forEach(el => { if (el !== inputLine) el.remove(); });
        BOOT.forEach(({ cls, html }) => appendLine(cls, html));
        appendSpacer();
        scrollBottom();
        return;
      }

      if (handler) {
        const result = handler();
        if (Array.isArray(result)) {
          appendSpacer();
          result.forEach(({ cls, html }) => appendLine(cls, html));
          appendSpacer();
        }
      } else {
        appendLine('to-err', `  command not found: <span class="to-bold">${escHtml(trimmed)}</span>  — try <span class="to-accent">help</span>`);
        appendSpacer();
      }

      scrollBottom();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    /* ═════════════════════════════════════
       INPUT EVENTS
    ═════════════════════════════════════ */
    /* Click anywhere to focus */
    terminal.addEventListener('click', () => input.focus());
    body.addEventListener('click', () => input.focus());

    input.addEventListener('focus', () => {
      cursor.style.display = 'none';
      terminal.style.borderColor = 'rgba(0,255,136,.5)';
    });
    input.addEventListener('blur', () => {
      cursor.style.display = '';
      terminal.style.borderColor = '';
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const val = input.value;
        input.value = '';
        runCmd(val);
      }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (histIdx < cmdHistory.length - 1) histIdx++;
        input.value = cmdHistory[histIdx] || '';
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (histIdx > 0) histIdx--;
        else { histIdx = -1; input.value = ''; }
        input.value = histIdx >= 0 ? cmdHistory[histIdx] : '';
      }
      if (e.key === 'Tab') {
        e.preventDefault();
        const partial = input.value.trim().toLowerCase();
        if (!partial) return;
        const match = CMD_KEYS.find(k => k.startsWith(partial) && k !== partial);
        if (match) input.value = match;
      }
    });

    /* ── Quick-command buttons ── */
    document.querySelectorAll('.tqb-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        runCmd(btn.dataset.cmd);
        input.focus();
      });
    });

  })();
  </script>
