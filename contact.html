<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Edwar Ramírez</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<body>
  <canvas id="matrixCanvas"></canvas>
  <div id="nav-placeholder"></div>

<!-- ─────────────────────────────────────
       CONTACT
  ───────────────────────────────────── -->
  <section class="section" id="contact">
    <div class="wrap">
      <div class="sec-head">
        <span class="sec-n">07</span>
        <h2 data-i18n="ct_title">Contact</h2>
        <span class="sec-line"></span>
      </div>
      <div class="ct-layout">
        <div class="ct-info">
          <p class="ct-headline" data-i18n="ct_hl">Have a project in mind<br>or want to connect?</p>
          <p class="ct-sub" data-i18n="ct_sub">I'm always open to new opportunities, collaborations, or just a good conversation about tech.</p>
          <div class="ct-email">
            <i class="fas fa-envelope"></i>
            <a href="/cdn-cgi/l/email-protection#d6b3b2a1b7a4b2b2b3bab5b7a5a2bfbabab9e296b1bbb7bfbaf8b5b9bb"><span class="__cf_email__" data-cfemail="e683829187948282838a858795928f8a8a89d2a6818b878f8ac885898b">[email&#160;protected]</span></a>
          </div>
          <div class="ct-socials">
            <a href="https://www.linkedin.com/in/edwar-ram%C3%ADrez-11b995270/" target="_blank" rel="noopener" class="csoc"><i class="fab fa-linkedin"></i></a>
            <a href="https://github.com/erac73" target="_blank" rel="noopener" class="csoc"><i class="fab fa-github"></i></a>
            <a href="https://x.com/666_serpico" target="_blank" rel="noopener" class="csoc"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="/cdn-cgi/l/email-protection#bedbdac9dfccdadadbd2dddfcdcad7d2d2d18afed9d3dfd7d290ddd1d3" class="csoc"><i class="fas fa-envelope"></i></a>
          </div>
        </div>
        <form class="ct-form" action="https://getform.io/f/adrnrela" method="POST">
          <div class="form-row">
            <div class="ff"><label data-i18n="f_name">Name</label><input type="text" name="name" data-i18n-ph="f_ph_name" placeholder="John Doe" required/></div>
            <div class="ff"><label data-i18n="f_email">Email</label><input type="email" name="email" placeholder="john@email.com" required/></div>
          </div>
          <div class="ff"><label data-i18n="f_msg">Message</label><textarea name="message" data-i18n-ph="f_ph_msg" placeholder="Tell me about your project..." required></textarea></div>
          <input type="hidden" name="_gotcha" style="display:none!important">
          <button type="submit" class="btn-solid"><span data-i18n="f_send">Send Message</span> <i class="fas fa-paper-plane"></i></button>
        </form>
      </div>
    </div>
  </section>
  <div id="footer-placeholder"></div>
  <script src="components.js"></script>
  <script src="script.js"></script>
</body>
</html>
